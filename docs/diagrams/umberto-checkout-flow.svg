<rect x="630" y="505" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="825" y="541" text-anchor="middle" font-family="sans-serif" font-size="18">Sanitize public documentation</text>
<line x1="825" y1="458" x2="825" y2="500" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="630" y="610" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="825" y="646" text-anchor="middle" font-family="sans-serif" font-size="18">Review repository diffs</text>
<line x1="825" y1="563" x2="825" y2="605" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="630" y="715" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="825" y="751" text-anchor="middle" font-family="sans-serif" font-size="18">Human approval</text>
<line x1="825" y1="668" x2="825" y2="710" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="630" y="820" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="825" y="856" text-anchor="middle" font-family="sans-serif" font-size="18">Commit and publish</text>
<line x1="825" y1="773" x2="825" y2="815" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M470 743 C550 743 550 114 630 114" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
<text x="550" y="430" text-anchor="middle" font-family="sans-serif" font-size="16" transform="rotate(-90 550 430)">planned extension</text>
</svg>
