<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" role="img">
<title>Umberto checkout flow</title>
<rect width="1100" height="920" fill="white"/>
