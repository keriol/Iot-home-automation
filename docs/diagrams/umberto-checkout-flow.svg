<rect x="630" y="400" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="825" y="436" text-anchor="middle" font-family="sans-serif" font-size="18">Generate worklog and models</text>
