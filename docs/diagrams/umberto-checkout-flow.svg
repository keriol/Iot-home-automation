<text x="275" y="226" text-anchor="middle" font-family="sans-serif" font-size="18">Read SQLite ledger</text>
<line x1="275" y1="143" x2="275" y2="185" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="295" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="275" y="331" text-anchor="middle" font-family="sans-serif" font-size="18">Rank open tasks</text>
