<rect x="80" y="400" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="275" y="436" text-anchor="middle" font-family="sans-serif" font-size="18">Recommend current task</text>
<line x1="275" y1="353" x2="275" y2="395" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="505" width="390" height="58" rx="10" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
<text x="275" y="541" text-anchor="middle" font-family="sans-serif" font-size="18">Human selects work</text>
