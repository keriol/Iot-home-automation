<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#333"/>
</marker>
</defs>
<text x="275" y="45" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="bold">Current foundation</text>
<text x="825" y="45" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="bold">Planned checkout</text>
